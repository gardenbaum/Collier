name: rust-check

on:
  push:
    branches: [main, 'test/**', 'fix/**', 'feat/**', 'chore/**']
  pull_request:
    branches: [main]

jobs:
  check:
    name: cargo check (linux)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install system deps (Tauri v2 on Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            build-essential \
            pkg-config

      - name: cargo check (no default features to skip dev-deps)
        working-directory: src-tauri
        run: cargo check --all-targets --message-format=short

      - name: cargo test (lib only, no e2e)
        working-directory: src-tauri
        # Tests die ein echtes bd brauchen, skippen sich selber via
        # `skip_if_no_bd`. Wir PREPENDEN target/debug statt PATH zu
        # ueberschreiben, sonst findet cargo sein eigenes Toolchain-Binary
        # in /home/runner/.cargo/bin nicht mehr.
        run: |
          export PATH="${{ github.workspace }}/src-tauri/target/debug:$PATH"
          cargo test --lib --no-fail-fast
