# Reusable E2E workflow.
#
# M0 spec R3 + the release-hardening card both want the
# xvfb + tauri-driver harness to run on a CI runner. ci.yml
# needs it on every PR / main push; release.yml needs it as a
# gate on tagged releases. Extracting the harness into a
# `workflow_call` keeps a single source of truth for the
# ~200-line setup — when the WebKit env vars, the tauri-driver
# warm-up, or the fixture seeders change, only one file moves.
#
# Triggered only via `uses:` from a caller workflow; never
# runs on its own (the empty `on: workflow_call:` block has
# no other entry points).

on:
  workflow_call:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Beads (`bd`) is fetched from upstream releases; pin the tag
  # so a future upstream rename doesn't silently break the E2E job.
  BEADS_VERSION: v1.0.4

jobs:
  e2e:
    name: e2e (xvfb + tauri-driver)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # Tauri v2 build deps + Xvfb + WebKitWebDriver (the native
      # W3C driver tauri-driver spawns on Linux). webkit2gtk-driver
      # is a transitional dummy that pulls in webkitgtk-webdriver
      # which provides the `WebKitWebDriver` binary on PATH.
      - name: Install Linux Tauri v2 + E2E runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            file \
            wget \
            libssl-dev \
            pkg-config \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            librsvg2-dev \
            libxdo-dev \
            xvfb \
            webkit2gtk-driver

      # Beads is the runtime backing the Tauri app. Pull a pinned
      # prebuilt so the CI doesn't depend on the container image
      # having `bd` installed by an operator.
      - name: Install Beads (bd)
        run: |
          set -euo pipefail
          url="https://github.com/steveyegge/beads/releases/download/${BEADS_VERSION}/beads_${BEADS_VERSION#v}_linux_amd64.tar.gz"
          echo "Downloading $url"
          curl -sSL --fail "$url" \
            | sudo tar xz -C /usr/local/bin bd
          bd --version

      # tauri-driver is a small Rust binary; ~2 min cold compile
      # plus ~30s with the rust cache. Future-friendly: pin to
      # the same major as src-tauri's tauri = "2".
      - name: Install tauri-driver
        run: cargo install tauri-driver --version "^2.0" --locked

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      # Debug build is ~5x faster than release on cold cache; we
      # only need the binary, not installers, so --no-bundle skips
      # .deb/.rpm/AppImage generation entirely.
      #
      # ponytail: `VITE_E2E=1` flips the build-time gate in
      # `src/main.tsx` that exposes the `queryClient` on
      # `window.__collierQueryClient__` so the wdio specs can read
      # cache state directly (bypassing the DOM-virtualizer race
      # that timed out r10 / r3 in CI). Only set for E2E builds;
      # production builds do NOT ship the debugging handle.
      - name: Build the app (debug, no bundle)
        env:
          VITE_E2E: '1'
        run: bun run tauri build --debug --no-bundle

      - name: Generate E2E fixture workspace
        run: |
          set -euo pipefail
          rm -rf /tmp/e2e-workspace
          scripts/make-fixture.sh /tmp/e2e-workspace
          # Sanity: fixture must expose a non-empty issue list.
          (cd /tmp/e2e-workspace && bd list --json | head -c 200 && echo)

      # M4: second fixture for the workspace-switcher spec. The
      # switcher dropdown reads ~/.beads/registry.json plus
      # recent_repos, so pre-populate the registry with both
      # workspaces BEFORE pre-warming the binary — the registry
      # lives at $HOME and survives the fixture teardown.
      - name: Generate second E2E fixture workspace
        run: |
          set -euo pipefail
          rm -rf /tmp/e2e-workspace-b
          scripts/make-second-fixture.sh /tmp/e2e-workspace-b
          # Pre-populate ~/.beads/registry.json with both fixtures
          # so the WorkspaceSwitcher dropdown shows both entries
          # on first render. Without this, the dropdown would only
          # list the active workspace (current) and we'd never see
          # a second entry to click. We deliberately write the
          # registry ourselves (instead of relying on `bd init` to
          # register them) so the fixture stays deterministic.
          # Use single-quoted heredoc to disable shell expansion —
          # `<<JSON` would still try to expand $HOME inside the
          # body, and the YAML parser treats the bare `:` in the
          # JSON keys as a YAML mapping separator on adjacent
          # lines. Single-quoted terminator + spaces around the
          # colons make the YAML linter happy.
          mkdir -p "$HOME/.beads"
          cat >"$HOME/.beads/registry.json" <<'REGISTRY_END'
          { "version" : 1, "workspaces" : [ { "path" : "/tmp/e2e-workspace" }, { "path" : "/tmp/e2e-workspace-b" }, { "path" : "/tmp/e2e-workspace-large" } ] }
          REGISTRY_END
          echo "Registry written to $HOME/.beads/registry.json"
          cat "$HOME/.beads/registry.json"

      # M6: large fixture for the perf E2E spec. We keep this
      # fixture SEPARATE from /tmp/e2e-workspace so the 12+ specs
      # that depend on the cheap 25-issue default fixture don't
      # regress. The 1200-issue seed takes ~80s on a fresh runner
      # (mostly `bd dep add --file` for the 480 parent-child
      # edges; `bd import` for the 1200 issues is <1s). The perf
      # spec reads the issue count via `bd list --all --json` to
      # assert against it directly, so we don't need to plumb the
      # count through an env var — the workspace IS the source of
      # truth.
      - name: Generate large E2E fixture workspace (M6 perf)
        run: |
          set -euo pipefail
          rm -rf /tmp/e2e-workspace-large
          scripts/make-large-fixture.sh /tmp/e2e-workspace-large 1200
          # Sanity: must expose >=1000 issues.
          count=$(cd /tmp/e2e-workspace-large && bd list --all --json | python3 -c "import sys, json; print(len(json.load(sys.stdin)))")
          if [ "$count" -lt 1000 ]; then
            echo "FAIL: large fixture seeded only $count issues (expected >= 1000)" >&2
            exit 1
          fi
          echo "Large fixture seeded $count issues."

      # Pre-warm the OS file cache for the Collier binary and its
      # shared libraries. The debug binary is 382 MB and the cold
      # load (mmap + dynamic linker + GTK / webkit2gtk init) on a
      # fresh runner takes 30-90s; WebKitWebDriver's session
      # creation handler waits for the spawned app to be fully
      # booted before returning, and a cold binary dominates that
      # wall. Boot the app under xvfb-run for a few seconds so the
      # file cache is warm by the time tauri-driver + WebKitWebDriver
      # actually need to spawn it; the warm spawn is ~5-10s instead.
      # CWD matters: the app reads .beads/ from current_dir(), so we
      # boot it from the fixture directory.
      - name: Pre-warm Collier OS file cache
        run: |
          set -euo pipefail
          export WEBKIT_DISABLE_SANDBOX_THIS_PROCESS=1
          export WEBKIT_DISABLE_DMABUF_RENDERER=1
          export GIO_USE_VFS=local
          export NO_AT_BRIDGE=1
          (
            cd /tmp/e2e-workspace
            xvfb-run -a \
              "$GITHUB_WORKSPACE/src-tauri/target/debug/collier" \
              > /tmp/collier-prewarm.log 2>&1 &
            echo $! > /tmp/collier-prewarm.pid
          )
          # Give the app time to load libs + open the webview; we
          # don't need the fixture data to load -- the next step
          # kills the process before it matters.
          sleep 15
          if [ -f /tmp/collier-prewarm.pid ]; then
            kill "$(cat /tmp/collier-prewarm.pid)" 2>/dev/null || true
          fi
          # Best-effort cleanup of any orphan webview children
          pkill -f target/debug/collier 2>/dev/null || true
          sleep 1
          echo "Pre-warm complete (binary loaded into OS file cache)"

      # tauri-driver launches the app as a child process, so the
      # child inherits the driver's cwd. The Tauri app reads
      # .beads/ from `current_dir()` (see
      # src-tauri/src/commands/recent_repos.rs), so we MUST cd
      # into the fixture before starting tauri-driver.
      #
      # xvfb-run supplies the display for the Tauri webview; the
      # driver itself does not need a display.
      #
      # The WebKit env vars below reduce cold-start latency and
      # flakiness on a fresh GitHub runner (no font cache, no
      # compositor, no D-Bus session, no GPU). tauri-driver
      # inherits its env from xvfb-run which inherits from the
      # step env, so every one of these reaches the spawned
      # WebKitWebDriver + Tauri app.
      #   - WEBKIT_DISABLE_SANDBOX_THIS_PROCESS=1
      #       skip the per-process sandbox setup that needs CAP_SYS_ADMIN
      #   - WEBKIT_DISABLE_DMABUF_RENDERER=1
      #       skip the GPU DMA-BUF path on a headless runner
      #   - GIO_USE_VFS=local
      #       use the local GIO VFS instead of Gvfsd (no GVFS in CI)
      #   - NO_AT_BRIDGE=1
      #       skip the accessibility bridge init that's slow on first boot
      #
      # ponytail: `RUST_MIN_STACK=33554432` (32 MiB) bumps the
      # main-thread stack size from the OS default (~8 MiB). tauri-driver
      # uses `tokio::main(flavor = "current_thread")` so every
      # spawned task reuses the main thread; on the Specta
      # v2.0.0-rc.25 binary (PR #150) the first /session POST
      # body — which now includes more typed params per command —
      # pushes hyper-util's HTTP/1 parser into a deeper recursion
      # than the OS-default 8 MiB main-thread stack can hold;
      # the task overflows, the relay dies mid-handshake, and
      # WebKitWebDriver's POST /session waits forever. The
      # overflow is logged 8× at job teardown (once per probe
      # timeout), confirming the same task crashes repeatedly.
      # 32 MiB is overkill for the actual call depth but cheap
      # (the process resident set stays well under the 7 GiB
      # runner limit) and turns the overflow into a clean
      # timeout the probe step can catch in seconds.
      #
      # ponytail: `E2E_SKIP_EXPORT_BINDINGS=1` skips the
      # debug-only `bindings::export_ts_bindings()` call in
      # `src-tauri/src/lib.rs`. With Specta v2.0.0-rc.25's
      # "everything is a NamedDataType" change, the TypeMap
      # walk during `.export()` is heavier; the export also
      # writes to `../src/lib/bindings.ts` from the runtime CWD
      # (resolves to `/tmp/src/lib/bindings.ts` in CI, never the
      # file the frontend imports). Set at RUNTIME here so the
      # spawned collier inherits it, not at build time.
      - name: Start tauri-driver under Xvfb
        run: |
          set -euo pipefail
          cd /tmp/e2e-workspace
          export WEBKIT_DISABLE_SANDBOX_THIS_PROCESS=1
          export WEBKIT_DISABLE_DMABUF_RENDERER=1
          export GIO_USE_VFS=local
          export NO_AT_BRIDGE=1
          export RUST_MIN_STACK=33554432
          export E2E_SKIP_EXPORT_BINDINGS=1
          nohup xvfb-run -a tauri-driver --port 4444 \
            > /tmp/tauri-driver.log 2>&1 &
          echo $! > /tmp/tauri-driver.pid
          # Wait for the W3C status endpoint to come up.
          for _ in $(seq 1 120); do
            if curl -sf http://127.0.0.1:4444/status > /dev/null; then
              echo "tauri-driver is up"
              exit 0
            fi
            sleep 1
          done
          echo "tauri-driver failed to start within 120s" >&2
          tail -50 /tmp/tauri-driver.log >&2 || true
          exit 1

      # tauri-driver (v2.x) is a pure relay: it spawns WebKitWebDriver
      # (the native W3C driver) on the default native port 4445 and
      # forwards /session to it. The /status check on tauri-driver's
      # own 4444 only proves the relay is up -- it does NOT prove the
      # native WebKitWebDriver is ready. If wdio races ahead and posts
      # /session before WebKitWebDriver has booted, the relay will
      # forward and the request will hang until the wdio
      # connectionRetryTimeout (600s, see tests/e2e/wdio.conf.ts)
      # aborts. Polling the native port here lets us warm the path
      # synchronously instead of paying the cold-start inside the
      # timeout budget.
      - name: Pre-warm WebKitWebDriver
        run: |
          set -euo pipefail
          for _ in $(seq 1 120); do
            if curl -sf http://127.0.0.1:4445/status > /dev/null; then
              echo "WebKitWebDriver is up"
              exit 0
            fi
            sleep 1
          done
          echo "WebKitWebDriver failed to start within 120s" >&2
          # tauri-driver.log is empty on a healthy start (tauri-driver
          # does no logging; WebKitWebDriver's stdout is /dev/null'd by
          # tauri-driver and stderr is inherited, so anything we see
          # is from stderr).
          if [ -f /tmp/tauri-driver.log ]; then
            echo "----- tauri-driver.log (last 100 lines) -----" >&2
            tail -100 /tmp/tauri-driver.log >&2 || true
          fi
          exit 1

      # Probe a real session create + DELETE before wdio starts.
      #
      # The previous two pre-warm steps prove that tauri-driver and
      # WebKitWebDriver are LISTENING, but neither proves the full
      # spawn-the-app + Dolt-cold-start + WebKit-handoff path works.
      # On the Specta v2.0.0-rc.25 binary (PR #150 / run 29822144882)
      # the relay and the native driver came up in <1s, but every
      # subsequent /session POST hung until wdio's 10-min
      # `connectionRetryTimeout` (tests/e2e/wdio.conf.ts) — burning
      # 17 × 10 min = ~3 hours per CI run. The probe forces that
      # cold-start path NOW, fails fast (~24 min cap) with a clean
      # error if it's broken, and lets wdio start with the path
      # already warm.
      #
      # Per-attempt `--max-time 660` is BELOW the 10-min wdio
      # `connectionRetryTimeout` (600s) so the probe is strictly
      # faster than the test it protects, but the actual session
      # creation observed on a fresh runner with this binary is
      # 3-6 min (Specta rc.25 TypeMap construction + Dolt cold start
      # + WebKit init). 3 attempts at 660s + 5s sleep = ~33 min
      # worst-case; we cap at 3 attempts because every attempt that
      # times out without a sessionId means the native driver is
      # wedged, not just slow.
      - name: Probe session create + delete
        env:
          WEBKIT_DISABLE_SANDBOX_THIS_PROCESS: '1'
          WEBKIT_DISABLE_DMABUF_RENDERER: '1'
          GIO_USE_VFS: local
          NO_AT_BRIDGE: '1'
          E2E_SKIP_EXPORT_BINDINGS: '1'
        run: |
          set -euo pipefail
          cd /tmp/e2e-workspace
          probe_payload=$(cat <<JSON
          {"capabilities":{"alwaysMatch":{"tauri:options":{"application":"$GITHUB_WORKSPACE/src-tauri/target/debug/collier"}}}}
          JSON
          )
          attempt=0
          while [ $attempt -lt 3 ]; do
            attempt=$((attempt + 1))
            response=$(curl -sf --max-time 660 -X POST \
              -H 'Content-Type: application/json' \
              -d "$probe_payload" \
              http://127.0.0.1:4444/session 2>&1) || response=""
            sid=$(printf '%s' "$response" \
              | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('value',{}).get('sessionId',''))" 2>/dev/null) \
              || sid=""
            if [ -n "$sid" ]; then
              echo "Probe session $sid created on attempt $attempt"
              curl -sf --max-time 30 -X DELETE \
                "http://127.0.0.1:4444/session/$sid" > /dev/null || true
              exit 0
            fi
            echo "Probe attempt $attempt: no sessionId returned"
            sleep 5
          done
          echo "Probe session creation failed after 3 attempts (~33 min)" >&2
          if [ -f /tmp/tauri-driver.log ]; then
            echo "----- tauri-driver.log (last 80 lines) -----" >&2
            tail -80 /tmp/tauri-driver.log >&2 || true
          fi
          exit 1

      - name: Run E2E smoke test
        run: bun run test:e2e
        env:
          E2E_TAURI_EXECUTABLE: ${{ github.workspace }}/src-tauri/target/debug/collier
          # ponytail: the E2E fixture (`scripts/make-fixture.sh`)
          # writes `.fixture-ids.json` into the fixture TARGET_DIR,
          # not the repo root. The wdio workers run from the repo
          # root, so a bare `.fixture-ids.json` lookup throws
          # ENOENT. Export the fixture dir and let the r4-detail
          # spec resolve the file from it. Falls back to the cwd
          # for local dev so the contract is unchanged.
          E2E_FIXTURE_DIR: /tmp/e2e-workspace

      # Best-effort cleanup: kill the driver even if the test step
      # was skipped, so the runner can reclaim resources quickly.
      - name: Stop tauri-driver
        if: always()
        run: |
          if [ -f /tmp/tauri-driver.pid ]; then
            kill "$(cat /tmp/tauri-driver.pid)" 2>/dev/null || true
          fi
          # Clean up any orphan Collier pre-warm or webview children
          pkill -f target/debug/collier 2>/dev/null || true
          pkill -f WebKitWebProcess 2>/dev/null || true
          if [ -f /tmp/tauri-driver.log ]; then
            echo "----- tauri-driver.log (last 100 lines) -----"
            tail -100 /tmp/tauri-driver.log || true
          fi

      # Screenshot on failure. The wdio `afterTest` hook drops a
      # PNG into tests/e2e/.artifacts/ when a test fails; we
      # upload the whole directory so failed runs have a visual
      # record for triage. `include-hidden-files: true` is
      # required because upload-artifact v4 excludes files
      # starting with a dot by default and .artifacts is hidden.
      - name: Upload E2E screenshot on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-screenshots
          path: tests/e2e/.artifacts
          include-hidden-files: true
          if-no-files-found: ignore
