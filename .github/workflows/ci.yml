name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Beads (`bd`) is fetched from upstream releases; pin the tag
  # so a future upstream rename doesn't silently break the E2E job.
  BEADS_VERSION: v1.0.4

jobs:
  check:
    name: check:all (bun + rust)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux Tauri v2 build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            file \
            wget \
            libssl-dev \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            librsvg2-dev \
            libxdo-dev

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Run check:all
        run: bun run check:all

  # M0 spec R3: Xvfb-backed E2E job. The Hermes worker is headless
  # and can't run a real GUI; this job exercises the same harness
  # (tauri-driver + WebdriverIO) on a CI runner under `xvfb-run`.
  # The current smoke test (tests/e2e/smoke.spec.ts) asserts the
  # "given fixture, when app launches, then issue list renders
  # >=1 row and window title is 'Collier'" contract from the spec.
  e2e:
    # The harness setup (Beads fetch, tauri-driver install, fixture
    # seeding, xvfb + WebKitWebDriver warm-up) is owned by the
    # reusable `.github/workflows/e2e.yml` workflow so the release
    # pipeline (release.yml) can `uses:` the same job as its own
    # gate. ci.yml used to inline the ~200 lines; the refactor
    # keeps a single source of truth for the WebKit env vars, the
    # tauri-driver warm-up, and the fixture seeders.
    uses: ./.github/workflows/e2e.yml

  # Cross-platform cheap build-check. Runs Tauri `build --check`
  # on every PR so platform-specific compile errors (Windows
  # MSVC quirks, macOS universal-binary surprises, webkit2gtk
  # linking) surface here instead of waiting for the next tag.
  # No bundles are produced -- only verifies that the code
  # compiles + links cleanly on each target OS. Cost is roughly
  # 2x a Linux build because of the two additional OS runners,
  # but catches the class of bugs that only manifest on one
  # platform (icon paths, MSVC CRT linkage, etc.).
  build-check:
    name: build-check (${{ matrix.os }})
    needs: check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Tauri build --no-bundle (compile + link, skip bundling)
        # Tauri v2 has no --check flag; --no-bundle runs the full
        # Rust compile + frontend bundle + Tauri-link step, but skips
        # the installer/bundle step (.dmg / .msi / .AppImage). This
        # is the canonical Tauri-CI fast-feedback idiom and is what
        # we want for cross-platform smoke testing on every PR.
        run: bun run tauri build --no-bundle --ci

  # Full cross-platform bundle build. Only on push to main
  # (not on PRs -- too expensive for the PR feedback loop and
  # PR builds have no signing keys anyway). Bundles are uploaded
  # as workflow artifacts (90-day retention) so maintainers can
  # grab an internal build without cutting a tag. To publish a
  # real release, push a `v*` tag and let `release.yml` run with
  # the proper TAURI_PRIVATE_KEY secrets.
  build-bundles:
    name: bundle (${{ matrix.os }})
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [check, e2e]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            args: '--bundles app,dmg'
            artifact: collier-macos
          - os: windows-latest
            args: '--bundles msi'
            artifact: collier-windows
          - os: ubuntu-22.04
            args: '--bundles appimage'
            artifact: collier-linux
    steps:
      - uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            file \
            wget \
            libssl-dev \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            librsvg2-dev \
            libxdo-dev \
            patchelf

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build bundles
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: __ci-main-${{ github.sha }}
          releaseName: 'Collier CI main ${{ github.sha }}'
          releaseDraft: true
          prerelease: true
          args: ${{ matrix.args }}

      - name: Upload bundles as workflow artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.app
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.AppImage
          if-no-files-found: warn
          retention-days: 90
