name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Beads (`bd`) is fetched from upstream releases; pin the tag
  # so a future upstream rename doesn't silently break the E2E job.
  BEADS_VERSION: v1.0.4

jobs:
  check:
    name: check:all (bun + rust)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux Tauri v2 build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            file \
            wget \
            libssl-dev \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            librsvg2-dev \
            libxdo-dev

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Run check:all
        run: bun run check:all

  # M0 spec R3: Xvfb-backed E2E job. The Hermes worker is headless
  # and can't run a real GUI; this job exercises the same harness
  # (tauri-driver + WebdriverIO) on a CI runner under `xvfb-run`.
  # The current smoke test (tests/e2e/smoke.spec.ts) asserts the
  # "given fixture, when app launches, then issue list renders
  # >=1 row and window title is 'Collier'" contract from the spec.
  e2e:
    # The harness setup (Beads fetch, tauri-driver install, fixture
    # seeding, xvfb + WebKitWebDriver warm-up) is owned by the
    # reusable `.github/workflows/e2e.yml` workflow so the release
    # pipeline (release.yml) can `uses:` the same job as its own
    # gate. ci.yml used to inline the ~200 lines; the refactor
    # keeps a single source of truth for the WebKit env vars, the
    # tauri-driver warm-up, and the fixture seeders.
    uses: ./.github/workflows/e2e.yml
