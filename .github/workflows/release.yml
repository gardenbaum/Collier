name: 'Release Collier'

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Static quality gate. Equivalent to running `bun run check:all`
  # locally — typecheck, lint, ast-grep, format check, rustfmt,
  # clippy -D warnings, vitest, cargo test. A tagged release that
  # violates any of these is rejected before we burn the
  # cross-platform build matrix on it.
  check-all:
    name: check:all (bun + rust)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux Tauri v2 build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            file \
            wget \
            libssl-dev \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            librsvg2-dev \
            libxdo-dev

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Run check:all
        run: bun run check:all

  # Behavioural gate. The xvfb + tauri-driver + WebdriverIO harness
  # lives in `.github/workflows/e2e.yml` so ci.yml and release.yml
  # share the exact same setup — when a fixture seeder or the
  # WebKit env-var set changes, only one file moves. A tagged
  # release that breaks the smoke contract is rejected before any
  # platform-specific build runs.
  e2e:
    name: e2e (xvfb + tauri-driver)
    uses: ./.github/workflows/e2e.yml

  publish-tauri:
    # Both gates must succeed before any platform build starts.
    # A failing check:all or a failing e2e halts the matrix
    # (fail-fast: false on the matrix itself is intentional — we
    # still want to see all three platform failures in one CI
    # log even if one fails first).
    needs: [check-all, e2e]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--bundles app,dmg'
          - platform: 'windows-latest'
            args: '--bundles msi'
          - platform: 'ubuntu-22.04'
            args: '--bundles appimage'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      # Tauri signing-key plumbing:
      #
      #   `secrets.TAURI_PRIVATE_KEY`           (GH secret, repo setting)
      #       │
      #       └── mapped to `env.TAURI_SIGNING_PRIVATE_KEY`
      #           (env name `tauri-action` consumes)
      #
      # `tauri-action` reads `TAURI_SIGNING_PRIVATE_KEY` /
      # `TAURI_SIGNING_PRIVATE_KEY_PASSWORD` directly from the
      # process env, NOT from the `with:` block — the `env:` map
      # below is the binding surface. The pubkey fingerprint baked
      # into `tauri.conf.json::plugins.updater.pubkey` MUST be the
      # matching public half of the secret in `TAURI_PRIVATE_KEY`,
      # or every existing user gets an "Invalid signature" error
      # on the next update check. Document the key pair generation
      # in `docs/developer/releases.md` so the rotation story
      # isn't tribal knowledge.
      #
      # Required GitHub repository secrets (Settings → Secrets and
      # variables → Actions):
      #
      #   - TAURI_PRIVATE_KEY
      #         Contents of the `~/.tauri/<key>.key` file generated
      #         by `tauri signer generate`. NEVER commit this.
      #         Rotate by re-generating + re-publishing the public
      #         half into tauri.conf.json (so existing users get
      #         the new pubkey with the next release).
      #
      #   - TAURI_SIGNING_PRIVATE_KEY_PASSWORD
      #         Password used when the key was generated. Empty
      #         string if no password was set.
      #
      # `GITHUB_TOKEN` is provisioned automatically by GitHub
      # Actions for every workflow run; no setup required.
      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name || inputs.version }}
          releaseName: 'Collier ${{ github.ref_name || inputs.version }}'
          releaseBody: |
            ## Collier ${{ github.ref_name || inputs.version }}

            ### Installation Instructions
            - **macOS**: Download the `.dmg` file and drag to Applications folder
            - **Windows**: Download the `.msi` file and run the installer
            - **Linux**: Download the `.AppImage` file, make it executable (`chmod +x`), and run

            ### Auto-Updates
            Existing users will receive automatic update notifications.

            **Full Changelog**: https://github.com/${{ github.repository }}/commits/${{ github.ref_name || inputs.version }}
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
